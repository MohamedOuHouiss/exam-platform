<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <pattern id="zellige" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- 8-point star motif -->
      <polygon points="25,2 29,12 40,12 31,19 34,30 25,23 16,30 19,19 10,12 21,12" fill="currentColor" opacity="0.5"/>
      <!-- Diamond connectors -->
      <rect x="23" y="40" width="4" height="8" rx="1" fill="currentColor" opacity="0.3"/>
      <rect x="0" y="23" width="8" height="4" rx="1" fill="currentColor" opacity="0.3"/>
      <rect x="42" y="23" width="8" height="4" rx="1" fill="currentColor" opacity="0.3"/>
      <!-- Corner dots -->
      <circle cx="0" cy="0" r="2" fill="currentColor" opacity="0.2"/>
      <circle cx="50" cy="0" r="2" fill="currentColor" opacity="0.2"/>
      <circle cx="0" cy="50" r="2" fill="currentColor" opacity="0.2"/>
      <circle cx="50" cy="50" r="2" fill="currentColor" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#zellige)"/>
</svg>
