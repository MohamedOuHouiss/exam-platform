<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Examen Rédaction — Faculté de Médecine et de Pharmacie de Fès" />
    <title>Rédaction — Examens FMPF</title>
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/timer.css" />
    <link rel="stylesheet" href="/css/navigator.css" />
    <link rel="stylesheet" href="/css/redaction.css" />
    <!-- Quill CSS -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
</head>

<body>
    <!-- ── Navigation Sidebar ── -->
    <aside class="nav-sidebar" id="navSidebar">
        <div class="nav-header">
            <img src="/assets/logo.svg" alt="FMPF" class="nav-logo" />
            <div>
                <div class="nav-title">Examen Rédaction</div>
                <div class="nav-subtitle">FMPF · 40 Questions</div>
            </div>
        </div>

        <div class="nav-progress">
            <div class="nav-progress-label">
                <span>Progression</span>
                <span id="progressText">0 / 40</span>
            </div>
            <div class="nav-progress-bar">
                <div class="nav-progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="nav-grid-container">
            <div class="nav-grid-label">Questions</div>
            <div class="nav-grid" id="navGrid">
                <!-- Pills 1-40 generated by JS -->
            </div>
        </div>

        <div class="nav-footer">
            <button class="btn btn-danger btn-sm" id="btnFinish">
                Terminer l'examen
            </button>
        </div>
    </aside>

    <!-- ── Mobile Nav Toggle ── -->
    <button class="nav-toggle" id="navToggle" aria-label="Ouvrir le navigateur de questions">
        ☰
    </button>

    <!-- ── Timer ── -->
    <div class="timer-container" id="timerContainer">
        <div class="timer-ring">
            <svg viewBox="0 0 100 100">
                <circle class="timer-ring-bg" cx="50" cy="50" r="44" />
                <circle class="timer-ring-progress" id="timerProgress" cx="50" cy="50" r="44" stroke-dasharray="276.46"
                    stroke-dashoffset="0" />
            </svg>
            <div class="timer-display">
                <span class="timer-time" id="timerTime">01:30:00</span>
                <span class="timer-label">Restant</span>
            </div>
        </div>
    </div>

    <!-- ── Main Content ── -->
    <main class="exam-content" id="examContent">
        <div id="questionContainer">
            <!-- Question prompt + Quill editor rendered by JS -->
        </div>
    </main>

    <!-- ── Finish Modal ── -->
    <div class="modal-overlay" id="finishModal">
        <div class="modal">
            <h2>Terminer l'examen ?</h2>
            <p id="finishModalText">Vous avez répondu à <strong>0</strong> questions sur 40.</p>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="btnCancelFinish">Annuler</button>
                <button class="btn btn-danger" id="btnConfirmFinish">Confirmer</button>
            </div>
        </div>
    </div>

    <!-- ── Time Up Modal ── -->
    <div class="modal-overlay" id="timeUpModal">
        <div class="modal">
            <h2>⏰ Temps écoulé</h2>
            <p>Le temps imparti est terminé. Vos réponses ont été enregistrées automatiquement.</p>
            <div class="modal-actions">
                <button class="btn btn-primary" id="btnTimeUpOk">Voir le résumé</button>
            </div>
        </div>
    </div>

    <!-- Quill JS -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script type="module" src="/js/redaction-engine.js"></script>
</body>

</html>
